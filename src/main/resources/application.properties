spring.application.name=bank
server.port=8081

# ========================
# MySQL - WRITE SIDE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/bank_write_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# MongoDB - READ SIDE
# ========================
spring.data.mongodb.uri=mongodb://localhost:27017/bank_read_db

# ========================
# Redis
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ========================
# Kafka
# ========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=balance-read-model-group-v5
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


# ========================
# Scheduling
# ========================
spring.task.scheduling.pool.size=2
